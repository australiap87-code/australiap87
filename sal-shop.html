<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Salería — Sales del Mundo</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5f0e8;
    --sand: #e8dcc8;
    --salt: #fdfaf5;
    --dark: #2a2118;
    --brown: #6b4f35;
    --accent: #c8a96e;
    --rose: #d4897a;
    --teal: #4a8b8c;
    --text: #3d3025;
    --light-text: #8a7560;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--dark);
    color: var(--cream);
    padding: 0 2rem;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 70px;
    box-shadow: 0 2px 20px rgba(0,0,0,0.3);
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    letter-spacing: 0.05em;
  }
  .logo span { color: var(--accent); font-style: italic; }

  .header-right { display: flex; align-items: center; gap: 2rem; }

  .cart-btn {
    background: var(--accent);
    color: var(--dark);
    border: none;
    padding: 0.5rem 1.2rem;
    border-radius: 30px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.9rem;
    transition: all 0.2s;
  }
  .cart-btn:hover { background: #d4b87e; transform: translateY(-1px); }

  .cart-count {
    background: var(--rose);
    color: white;
    border-radius: 50%;
    width: 20px; height: 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem;
    font-weight: 700;
  }

  /* HERO */
  .hero {
    background: linear-gradient(135deg, var(--dark) 0%, #3d2e1e 60%, var(--brown) 100%);
    color: var(--cream);
    padding: 4rem 2rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c8a96e' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    opacity: 0.4;
  }
  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    margin-bottom: 1rem;
    position: relative;
  }
  .hero p {
    font-size: 1.1rem;
    color: var(--sand);
    max-width: 500px;
    margin: 0 auto;
    position: relative;
  }

  /* FILTERS */
  .filters {
    background: var(--salt);
    padding: 1rem 2rem;
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--sand);
    position: sticky;
    top: 70px;
    z-index: 90;
    align-items: center;
  }
  .filter-label { font-size: 0.8rem; color: var(--light-text); font-weight: 500; margin-right: 0.5rem; }
  .filter-btn {
    background: none;
    border: 1.5px solid var(--sand);
    padding: 0.3rem 0.8rem;
    border-radius: 20px;
    font-size: 0.8rem;
    cursor: pointer;
    color: var(--text);
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--dark);
    font-weight: 500;
  }

  /* SEARCH */
  .search-bar {
    padding: 1.5rem 2rem 0;
    max-width: 400px;
  }
  .search-bar input {
    width: 100%;
    padding: 0.7rem 1.2rem;
    border: 1.5px solid var(--sand);
    border-radius: 30px;
    background: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .search-bar input:focus { border-color: var(--accent); }

  /* GRID */
  .products-section { padding: 1.5rem 2rem 4rem; }
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    margin-bottom: 1.5rem;
    color: var(--dark);
  }
  .products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 1.2rem;
  }

  /* CARD */
  .product-card {
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    transition: all 0.25s;
    display: flex;
    flex-direction: column;
  }
  .product-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.12);
  }

  .card-img {
    height: 140px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3.5rem;
    position: relative;
  }

  .card-badge {
    position: absolute;
    top: 8px;
    right: 8px;
    background: var(--rose);
    color: white;
    font-size: 0.65rem;
    font-weight: 700;
    padding: 0.2rem 0.5rem;
    border-radius: 10px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .card-badge.org { background: var(--teal); }
  .card-badge.rare { background: var(--brown); }

  .card-body {
    padding: 0.9rem;
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  .card-category {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--light-text);
    margin-bottom: 0.3rem;
  }
  .card-name {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    color: var(--dark);
    margin-bottom: 0.3rem;
    line-height: 1.3;
  }
  .card-desc {
    font-size: 0.78rem;
    color: var(--light-text);
    line-height: 1.4;
    flex: 1;
    margin-bottom: 0.8rem;
  }
  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .card-price {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--brown);
  }
  .card-weight {
    font-size: 0.7rem;
    color: var(--light-text);
  }

  .add-btn {
    background: var(--dark);
    color: white;
    border: none;
    padding: 0.45rem 0.9rem;
    border-radius: 20px;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
  }
  .add-btn:hover { background: var(--brown); }
  .add-btn.added {
    background: var(--teal);
    animation: pop 0.3s ease;
  }

  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--dark);
    color: white;
    padding: 0.8rem 1.5rem;
    border-radius: 30px;
    font-size: 0.9rem;
    z-index: 500;
    transition: transform 0.3s ease;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* CART SIDEBAR */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .overlay.open { opacity: 1; pointer-events: all; }

  .cart-sidebar {
    position: fixed;
    top: 0; right: 0;
    width: min(420px, 100vw);
    height: 100vh;
    background: var(--salt);
    z-index: 300;
    transform: translateX(100%);
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    display: flex;
    flex-direction: column;
  }
  .cart-sidebar.open { transform: translateX(0); }

  .cart-header {
    background: var(--dark);
    color: white;
    padding: 1.2rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .cart-header h2 { font-family: 'Playfair Display', serif; font-size: 1.3rem; }

  .close-btn {
    background: none;
    border: none;
    color: white;
    font-size: 1.5rem;
    cursor: pointer;
    line-height: 1;
  }

  .cart-items { flex: 1; overflow-y: auto; padding: 1rem; }

  .cart-empty {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--light-text);
  }
  .cart-empty .big-icon { font-size: 3rem; margin-bottom: 1rem; }

  .cart-item {
    background: white;
    border-radius: 10px;
    padding: 0.8rem;
    margin-bottom: 0.8rem;
    display: flex;
    gap: 0.8rem;
    align-items: center;
  }
  .ci-emoji { font-size: 1.8rem; }
  .ci-info { flex: 1; }
  .ci-name { font-weight: 500; font-size: 0.9rem; color: var(--dark); }
  .ci-price { font-size: 0.8rem; color: var(--light-text); }
  .ci-controls { display: flex; align-items: center; gap: 0.5rem; }
  .qty-btn {
    background: var(--sand);
    border: none;
    width: 26px; height: 26px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
    color: var(--dark);
    transition: background 0.2s;
  }
  .qty-btn:hover { background: var(--accent); }
  .qty-num { font-weight: 600; font-size: 0.9rem; min-width: 20px; text-align: center; }
  .ci-remove {
    background: none;
    border: none;
    color: var(--rose);
    cursor: pointer;
    font-size: 1rem;
    padding: 0.2rem;
  }

  .cart-footer {
    padding: 1rem 1.2rem;
    border-top: 1px solid var(--sand);
    background: white;
  }
  .cart-total {
    display: flex;
    justify-content: space-between;
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 1rem;
    color: var(--dark);
  }
  .checkout-btn {
    width: 100%;
    background: var(--accent);
    color: var(--dark);
    border: none;
    padding: 0.9rem;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .checkout-btn:hover { background: #d4b87e; }
  .checkout-btn:disabled { background: var(--sand); color: var(--light-text); cursor: not-allowed; }

  /* CHECKOUT MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 400;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: white;
    border-radius: 16px;
    width: min(560px, 100%);
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }

  .modal-header {
    background: var(--dark);
    color: white;
    padding: 1.2rem 1.5rem;
    border-radius: 16px 16px 0 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-header h2 { font-family: 'Playfair Display', serif; }

  .modal-body { padding: 1.5rem; }

  .step-indicator {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
  }
  .step {
    flex: 1;
    height: 4px;
    background: var(--sand);
    border-radius: 2px;
    transition: background 0.3s;
  }
  .step.active { background: var(--accent); }
  .step.done { background: var(--teal); }

  .form-section h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    margin-bottom: 1rem;
    color: var(--dark);
  }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; margin-bottom: 0.8rem; }
  .form-group { display: flex; flex-direction: column; gap: 0.3rem; margin-bottom: 0.8rem; }
  .form-group label { font-size: 0.8rem; font-weight: 500; color: var(--light-text); }
  .form-group input, .form-group select {
    padding: 0.65rem 0.9rem;
    border: 1.5px solid var(--sand);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--text);
    background: var(--cream);
    outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus, .form-group select:focus { border-color: var(--accent); }

  .order-summary {
    background: var(--cream);
    border-radius: 10px;
    padding: 1rem;
    margin-bottom: 1rem;
  }
  .order-summary h4 { font-weight: 600; margin-bottom: 0.7rem; font-size: 0.9rem; }
  .summary-item { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 0.4rem; }
  .summary-total { font-weight: 700; font-size: 1rem; border-top: 1px solid var(--sand); padding-top: 0.5rem; margin-top: 0.5rem; }

  /* payment fields */
  .card-visual {
    background: linear-gradient(135deg, var(--dark), var(--brown));
    color: white;
    border-radius: 12px;
    padding: 1.2rem;
    margin-bottom: 1rem;
    position: relative;
  }
  .card-visual .chip { font-size: 1.5rem; margin-bottom: 0.5rem; }
  .card-visual .card-number-display {
    font-size: 1.1rem;
    letter-spacing: 0.2em;
    font-family: monospace;
    margin-bottom: 0.5rem;
  }
  .card-visual .card-meta { display: flex; gap: 2rem; font-size: 0.75rem; opacity: 0.7; }

  .modal-actions {
    display: flex;
    gap: 0.8rem;
    margin-top: 1rem;
  }
  .btn-secondary {
    flex: 1;
    background: var(--sand);
    color: var(--text);
    border: none;
    padding: 0.8rem;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
  }
  .btn-primary {
    flex: 2;
    background: var(--accent);
    color: var(--dark);
    border: none;
    padding: 0.8rem;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-primary:hover { background: #d4b87e; }

  /* SUCCESS */
  .success-screen {
    text-align: center;
    padding: 2rem;
  }
  .success-screen .big { font-size: 4rem; margin-bottom: 1rem; }
  .success-screen h3 { font-family: 'Playfair Display', serif; font-size: 1.5rem; margin-bottom: 0.5rem; }
  .success-screen p { color: var(--light-text); margin-bottom: 1.5rem; }
  .order-num { font-family: monospace; background: var(--cream); padding: 0.5rem 1rem; border-radius: 8px; font-weight: 700; display: inline-block; margin-bottom: 1rem; }

  /* NO RESULTS */
  .no-results { text-align: center; padding: 3rem; color: var(--light-text); font-size: 1.1rem; }

  @media (max-width: 600px) {
    .form-row { grid-template-columns: 1fr; }
    .products-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">La <span>Salería</span></div>
  <div class="header-right">
    <button class="cart-btn" onclick="openCart()">
      🛒 Mi cesta
      <span class="cart-count" id="cartCount">0</span>
    </button>
  </div>
</header>

<!-- HERO -->
<div class="hero">
  <h1>Sales del Mundo</h1>
  <p>100 variedades únicas — desde volcanes, océanos y montañas hasta tu mesa</p>
</div>

<!-- SEARCH -->
<div class="search-bar">
  <input type="text" id="searchInput" placeholder="🔍  Buscar sal..." oninput="filterProducts()">
</div>

<!-- FILTERS -->
<div class="filters">
  <span class="filter-label">Filtrar:</span>
  <button class="filter-btn active" onclick="setFilter('all', this)">Todas</button>
  <button class="filter-btn" onclick="setFilter('marina', this)">Marina</button>
  <button class="filter-btn" onclick="setFilter('mineral', this)">Mineral</button>
  <button class="filter-btn" onclick="setFilter('ahumada', this)">Ahumada</button>
  <button class="filter-btn" onclick="setFilter('aromatica', this)">Aromática</button>
  <button class="filter-btn" onclick="setFilter('negra', this)">Negra</button>
  <button class="filter-btn" onclick="setFilter('rosa', this)">Rosa</button>
  <button class="filter-btn" onclick="setFilter('especial', this)">Especial</button>
</div>

<!-- PRODUCTS -->
<div class="products-section">
  <div class="section-title">Nuestras Sales</div>
  <div class="products-grid" id="productsGrid"></div>
  <div class="no-results" id="noResults" style="display:none">No se encontraron sales con ese filtro 🧂</div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeCart()"></div>

<!-- CART SIDEBAR -->
<div class="cart-sidebar" id="cartSidebar">
  <div class="cart-header">
    <h2>🛒 Tu cesta</h2>
    <button class="close-btn" onclick="closeCart()">✕</button>
  </div>
  <div class="cart-items" id="cartItems">
    <div class="cart-empty">
      <div class="big-icon">🧂</div>
      <p>Tu cesta está vacía.<br>¡Añade algunas sales!</p>
    </div>
  </div>
  <div class="cart-footer">
    <div class="cart-total">
      <span>Total</span>
      <span id="cartTotal">0,00 €</span>
    </div>
    <button class="checkout-btn" id="checkoutBtn" onclick="openCheckout()" disabled>Siguiente → Tramitar pedido</button>
  </div>
</div>

<!-- CHECKOUT MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">📦 Tramitar pedido</h2>
      <button class="close-btn" onclick="closeCheckout()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

const BG_COLORS = {
  marina: '#e8f4f8', mineral: '#f0ede8', ahumada: '#f5ede3', aromatica: '#f0f5e8',
  negra: '#e8e8e8', rosa: '#fce8e8', especial: '#f0ece0'
};

let cart = {};
let activeFilter = 'all';

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterProducts();
}

function filterProducts() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const grid = document.getElementById('productsGrid');
  const noRes = document.getElementById('noResults');
  const filtered = PRODUCTS.filter(p => {
    const matchCat = activeFilter === 'all' || p.cat === activeFilter;
    const matchQ = !q || p.name.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q);
    return matchCat && matchQ;
  });
  grid.innerHTML = filtered.map(renderCard).join('');
  noRes.style.display = filtered.length === 0 ? 'block' : 'none';
}

function renderCard(p) {
  const badgeHtml = p.badge
    ? `<div class="card-badge ${p.badge === 'org' ? 'org' : p.badge === 'rare' ? 'rare' : ''}">${p.badge === 'premium' ? 'Premium' : p.badge === 'org' ? 'Eco' : 'Rareza'}</div>`
    : '';
  const bg = BG_COLORS[p.cat] || '#f5f5f5';
  return `
    <div class="product-card">
      <div class="card-img" style="background:${bg}">
        ${p.emoji}
        ${badgeHtml}
      </div>
      <div class="card-body">
        <div class="card-category">${p.cat}</div>
        <div class="card-name">${p.name}</div>
        <div class="card-desc">${p.desc}</div>
        <div class="card-footer">
          <div>
            <div class="card-price">${p.price.toFixed(2).replace('.',',')} €</div>
            <div class="card-weight">${p.weight}</div>
          </div>
          <button class="add-btn" id="btn-${p.id}" onclick="addToCart(${p.id})">+ Añadir</button>
        </div>
      </div>
    </div>`;
}

function addToCart(id) {
  const p = PRODUCTS.find(x => x.id === id);
  if (!cart[id]) cart[id] = { ...p, qty: 0 };
  cart[id].qty++;
  updateCartUI();
  const btn = document.getElementById('btn-' + id);
  if (btn) { btn.textContent = '✓ Añadido'; btn.classList.add('added'); setTimeout(() => { btn.textContent = '+ Añadir'; btn.classList.remove('added'); }, 1500); }
  showToast(`🧂 ${p.name} añadida a la cesta`);
}

function removeFromCart(id) {
  if (cart[id]) {
    cart[id].qty--;
    if (cart[id].qty <= 0) delete cart[id];
    updateCartUI();
  }
}

function deleteFromCart(id) {
  delete cart[id];
  updateCartUI();
}

function updateCartUI() {
  const items = Object.values(cart);
  const total = items.reduce((s, x) => s + x.price * x.qty, 0);
  const count = items.reduce((s, x) => s + x.qty, 0);
  document.getElementById('cartCount').textContent = count;
  document.getElementById('cartTotal').textContent = total.toFixed(2).replace('.', ',') + ' €';
  document.getElementById('checkoutBtn').disabled = items.length === 0;

  const el = document.getElementById('cartItems');
  if (items.length === 0) {
    el.innerHTML = `<div class="cart-empty"><div class="big-icon">🧂</div><p>Tu cesta está vacía.<br>¡Añade algunas sales!</p></div>`;
    return;
  }
  el.innerHTML = items.map(item => `
    <div class="cart-item">
      <div class="ci-emoji">${item.emoji}</div>
      <div class="ci-info">
        <div class="ci-name">${item.name}</div>
        <div class="ci-price">${(item.price * item.qty).toFixed(2).replace('.',',')} €</div>
      </div>
      <div class="ci-controls">
        <button class="qty-btn" onclick="removeFromCart(${item.id})">−</button>
        <span class="qty-num">${item.qty}</span>
        <button class="qty-btn" onclick="addToCart(${item.id})">+</button>
        <button class="ci-remove" onclick="deleteFromCart(${item.id})">🗑️</button>
      </div>
    </div>`).join('');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function openCart() {
  document.getElementById('cartSidebar').classList.add('open');
  document.getElementById('overlay').classList.add('open');
}
function closeCart() {
  document.getElementById('cartSidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

// CHECKOUT
let checkoutStep = 1;

function openCheckout() {
  closeCart();
  checkoutStep = 1;
  document.getElementById('modalOverlay').classList.add('open');
  renderCheckoutStep();
}
function closeCheckout() {
  document.getElementById('modalOverlay').classList.remove('open');
}

      </select></div>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeCheckout()">Cancelar</button>
      <button class="btn-primary" onclick="nextStep()">Continuar → Pago</button>
    </div>`;
  }

  else if (checkoutStep === 2) {
    document.getElementById('modalTitle').textContent = '💳 Pago';
    html += `<div class="form-section">
      <div class="card-visual">
        <div class="chip">💳</div>
        <div class="card-number-display" id="cardDisplay">•••• •••• •••• ••••</div>
        <div class="card-meta"><span id="cardNameDisplay">NOMBRE APELLIDOS</span><span id="cardExpDisplay">MM/AA</span></div>
      </div>
      <div class="form-group"><label>Número de tarjeta</label>
        <input id="cardNum" type="text" placeholder="1234 5678 9012 3456" maxlength="19"
          oninput="this.value=this.value.replace(/[^0-9]/g,'').replace(/(.{4})/g,'$1 ').trim(); document.getElementById('cardDisplay').textContent=this.value||'•••• •••• •••• ••••'">
      </div>
      <div class="form-group"><label>Nombre en la tarjeta</label>
        <input id="cardName" type="text" placeholder="MARÍA GARCÍA" style="text-transform:uppercase"
          oninput="document.getElementById('cardNameDisplay').textContent=this.value.toUpperCase()||'NOMBRE APELLIDOS'">
      </div>
      <div class="form-row">
        <div class="form-group"><label>Caducidad</label>
          <input id="cardExp" type="text" placeholder="MM/AA" maxlength="5"
            oninput="let v=this.value.replace(/[^0-9]/g,'');if(v.length>=3)v=v.slice(0,2)+'/'+v.slice(2);this.value=v; document.getElementById('cardExpDisplay').textContent=this.value||'MM/AA'">
        </div>
        <div class="form-group"><label>CVV</label><input id="cardCvv" type="text" placeholder="123" maxlength="4"></div>
      </div>
      <div class="order-summary">
        <h4>Resumen del pedido</h4>
        ${items.map(i => `<div class="summary-item"><span>${i.emoji} ${i.name} ×${i.qty}</span><span>${(i.price*i.qty).toFixed(2).replace('.',',')} €</span></div>`).join('')}
        <div class="summary-item"><span>🚚 Envío ${shipping === 0 ? '(gratis +30€)' : ''}</span><span>${shipping === 0 ? 'GRATIS' : shipping.toFixed(2).replace('.',',') + ' €'}</span></div>
        <div class="summary-item summary-total"><span>TOTAL</span><span>${finalTotal.toFixed(2).replace('.',',')} €</span></div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="prevStep()">← Atrás</button>
      <button class="btn-primary" onclick="placeOrder()">🔒 Pagar ${finalTotal.toFixed(2).replace('.',',')} €</button>
    </div>`;
  }

  else if (checkoutStep === 3) {
    document.getElementById('modalTitle').textContent = '¡Pedido confirmado!';
    const orderNum = 'SAL-' + Math.floor(Math.random()*90000+10000);
    html += `<div class="success-screen">
      <div class="big">🎉</div>
      <h3>¡Gracias por tu pedido!</h3>
      <p>Te hemos enviado la confirmación por email</p>
      <div class="order-num">${orderNum}</div>
      <p style="font-size:0.85rem">Entrega estimada: <strong>3-5 días laborables</strong></p>
      <div style="margin-top:1.5rem">
        <button class="btn-primary" style="width:100%; padding:0.9rem" onclick="closeCheckout(); cart={}; updateCartUI();">Volver a la tienda</button>
      </div>
    </div>`;
  }

  document.getElementById('modalBody').innerHTML = html;
}

function nextStep() { checkoutStep++; renderCheckoutStep(); }
function prevStep() { checkoutStep--; renderCheckoutStep(); }

function placeOrder() {
  // Simple validation
  const cardNum = document.getElementById('cardNum');
  if (!cardNum || cardNum.value.replace(/\s/g,'').length < 16) {
    showToast('⚠️ Por favor rellena todos los datos de pago'); return;
  }
  checkoutStep = 3;
  renderCheckoutStep();
}

// Init
filterProducts();
</script>
</body>
</html>
